<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zentinel Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #181824;
  --border: #1e1e2e;
  --text: #e0e0e8;
  --dim: #6b6b80;
  --accent: #4d7aff;
  --error: #ff4d6a;
  --warning: #ffb84d;
  --info: #4dd4ff;
  --success: #4dff88;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'SF Mono','Fira Code','JetBrains Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; }

.header { text-align:center; padding:1.5rem 1rem 1rem; border-bottom:1px solid var(--border); }
.header img { width:56px; margin-bottom:0.3rem; }
.header h1 { font-size:1.4rem; font-weight:600; letter-spacing:0.05em; }
.header p { color:var(--dim); font-size:0.75rem; margin-top:0.2rem; }

.input-bar { max-width:700px; margin:1.5rem auto; display:flex; gap:0.5rem; padding:0 1rem; }
.input-bar input { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.7rem 1rem; font-family:inherit; font-size:0.85rem; border-radius:6px; outline:none; }
.input-bar input:focus { border-color:var(--accent); }
.input-bar button { background:var(--accent); border:none; color:#fff; padding:0.7rem 1.5rem; font-family:inherit; font-size:0.85rem; font-weight:600; border-radius:6px; cursor:pointer; }
.input-bar button:disabled { opacity:0.4; cursor:wait; }

#status { text-align:center; color:var(--dim); font-size:0.8rem; min-height:1.3rem; margin-bottom:0.5rem; }
.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.dashboard { display:none; max-width:1300px; margin:0 auto; padding:0 1rem 3rem; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1rem; text-align:center; cursor:pointer; transition:border-color 0.2s; }
.stat-card:hover { border-color:var(--accent); }
.stat-card.active { border-color:var(--accent); box-shadow:0 0 12px rgba(77,122,255,0.2); }
.stat-card .value { font-size:1.8rem; font-weight:700; color:var(--accent); }
.stat-card .label { font-size:0.65rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin-top:0.15rem; }
.stat-card.error .value { color:var(--error); }
.stat-card.warning .value { color:var(--warning); }
.stat-card.info .value { color:var(--info); }

/* Filter bar */
.filter-bar { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; margin-bottom:1.5rem; padding:0.75rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; }
.filter-bar label { font-size:0.7rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.08em; }
.filter-btn { background:var(--surface2); border:1px solid var(--border); color:var(--dim); padding:4px 10px; font-family:inherit; font-size:0.7rem; border-radius:4px; cursor:pointer; transition:all 0.15s; }
.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.filter-btn.sev-ERROR.active { background:var(--error); border-color:var(--error); }
.filter-btn.sev-WARNING.active { background:var(--warning); border-color:var(--warning); color:#000; }
.filter-btn.sev-INFO.active { background:var(--info); border-color:var(--info); color:#000; }
.filter-search { flex:1; min-width:150px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 8px; font-family:inherit; font-size:0.75rem; border-radius:4px; outline:none; }
.filter-search:focus { border-color:var(--accent); }
.filter-count { font-size:0.75rem; color:var(--accent); margin-left:auto; }

/* Charts */
.charts-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem; margin-bottom:1.5rem; }
@media(max-width:900px) { .charts-row { grid-template-columns:1fr; } }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1rem; }
.chart-card h3 { font-size:0.7rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.75rem; }

/* Findings */
.findings-section { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.findings-header { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; border-bottom:1px solid var(--border); }
.findings-header h3 { font-size:0.7rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin:0; }
.findings-header .sort-btns { display:flex; gap:0.3rem; }
.findings-header .sort-btn { background:var(--surface2); border:1px solid var(--border); color:var(--dim); padding:2px 8px; font-family:inherit; font-size:0.6rem; border-radius:3px; cursor:pointer; }
.findings-header .sort-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.findings-section table { width:100%; border-collapse:collapse; font-size:0.75rem; }
.findings-section th { text-align:left; padding:0.45rem 0.75rem; color:var(--dim); font-weight:500; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:1; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.05em; }
.findings-section td { padding:0.4rem 0.75rem; border-bottom:1px solid var(--border); }
.findings-scroll { max-height:600px; overflow-y:auto; }
.findings-scroll::-webkit-scrollbar { width:6px; }
.findings-scroll::-webkit-scrollbar-track { background:var(--surface); }
.findings-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.findings-scroll::-webkit-scrollbar-thumb:hover { background:var(--dim); }

/* Severity badges */
.sev { font-weight:700; font-size:0.6rem; padding:2px 8px; border-radius:3px; letter-spacing:0.03em; }
.sev-ERROR { background:rgba(255,77,106,0.15); color:var(--error); }
.sev-WARNING { background:rgba(255,184,77,0.15); color:var(--warning); }
.sev-INFO { background:rgba(77,212,255,0.15); color:var(--info); }

/* File groups */
.file-group { cursor:pointer; user-select:none; }
.file-group:hover td { background:rgba(77,122,255,0.08); }
.file-group td { background:var(--surface2); padding:0.5rem 0.75rem; border-bottom:1px solid var(--border); }
.file-name { font-weight:600; color:var(--text); }
.file-path { color:var(--dim); font-weight:400; }
.file-badge { font-size:0.6rem; padding:1px 6px; border-radius:8px; margin-left:0.5rem; font-weight:600; }
.file-badge-error { background:rgba(255,77,106,0.2); color:var(--error); }
.file-badge-warning { background:rgba(255,184,77,0.2); color:var(--warning); }
.file-badge-info { background:rgba(77,212,255,0.2); color:var(--info); }
.file-chevron { display:inline-block; transition:transform 0.15s; margin-right:0.4rem; color:var(--dim); font-size:0.7rem; }
.file-group.collapsed .file-chevron { transform:rotate(-90deg); }

/* Finding rows */
.finding-row td { border-left:3px solid transparent; }
.finding-row.sev-border-ERROR td:first-child { border-left-color:var(--error); }
.finding-row.sev-border-WARNING td:first-child { border-left-color:var(--warning); }
.finding-row.sev-border-INFO td:first-child { border-left-color:var(--info); }
.finding-row:hover td { background:var(--surface2); }
.finding-row td.line-cell { color:var(--dim); font-variant-numeric:tabular-nums; }
.finding-row td.rule-cell { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.finding-row td.msg-cell { color:var(--dim); max-width:400px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:0.7rem; }
.finding-row.expanded td.msg-cell { white-space:normal; overflow:visible; color:var(--text); }
.finding-row { cursor:pointer; }

/* Category pills */
.cat-pill { font-size:0.55rem; padding:1px 6px; border-radius:3px; cursor:pointer; transition:background 0.15s; text-transform:uppercase; letter-spacing:0.04em; }
.cat-pill:hover { filter:brightness(1.3); }
.cat-cmd { background:rgba(255,77,106,0.12); color:var(--error); }
.cat-code { background:rgba(255,130,77,0.12); color:#ff824d; }
.cat-crypto { background:rgba(77,212,255,0.12); color:var(--info); }
.cat-secrets { background:rgba(255,184,77,0.12); color:var(--warning); }
.cat-deser { background:rgba(200,77,255,0.12); color:#c84dff; }
.cat-xss { background:rgba(255,77,180,0.12); color:#ff4db4; }
.cat-sql { background:rgba(255,77,106,0.12); color:var(--error); }
.cat-net { background:rgba(77,255,136,0.12); color:var(--success); }
.cat-file { background:rgba(77,122,255,0.12); color:var(--accent); }
.cat-ai { background:rgba(155,77,255,0.12); color:#9b4dff; }
.cat-other { background:rgba(107,107,128,0.12); color:var(--dim); }
</style>
</head>
<body>

<div class="header">
  <img src="/static/logo.png" alt="Zentinel" onerror="this.style.display='none'">
  <h1>ZENTINEL</h1>
  <p>422 rules &middot; 4 languages &middot; 4 analysis tiers</p>
</div>

<div class="input-bar">
  <input type="text" id="repoUrl" placeholder="https://github.com/owner/repo" value="https://github.com/pallets/flask">
  <button id="scanBtn" onclick="startScan()">Scan</button>
</div>
<div id="status"></div>

<div class="dashboard" id="dashboard">
  <div class="stats-row" id="statsRow"></div>

  <div class="filter-bar" id="filterBar">
    <label>Filter:</label>
    <button class="filter-btn sev-ERROR active" data-sev="ERROR" onclick="toggleSev(this)">ERROR</button>
    <button class="filter-btn sev-WARNING active" data-sev="WARNING" onclick="toggleSev(this)">WARNING</button>
    <button class="filter-btn sev-INFO active" data-sev="INFO" onclick="toggleSev(this)">INFO</button>
    <span style="color:var(--border)">|</span>
    <label>Search:</label>
    <input class="filter-search" id="filterSearch" placeholder="rule, file, or message..." oninput="applyFilters()">
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Attack Surface Profile</h3>
      <canvas id="radarChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Severity</h3>
      <canvas id="sevChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Top Rules</h3>
      <canvas id="rulesChart"></canvas>
    </div>
  </div>

  <div class="charts-row" style="grid-template-columns:1fr 1fr;">
    <div class="chart-card">
      <h3>Languages (files)</h3>
      <canvas id="langChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Analysis Tiers</h3>
      <canvas id="tierChart"></canvas>
    </div>
  </div>

  <div class="findings-section">
    <div class="findings-header">
      <h3 id="findingsTitle">Findings</h3>
      <div class="sort-btns">
        <button class="sort-btn active" onclick="setSort('file',this)">By File</button>
        <button class="sort-btn" onclick="setSort('severity',this)">By Severity</button>
        <button class="sort-btn" onclick="setSort('category',this)">By Category</button>
      </div>
    </div>
    <div class="findings-scroll">
      <table>
        <thead><tr><th style="width:30px"></th><th>Line</th><th>Severity</th><th>Category</th><th>Rule</th><th>Message</th></tr></thead>
        <tbody id="findingsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let charts = {};
let scanData = null;
let activeFilters = { sevs: new Set(['ERROR','WARNING','INFO']), search: '' };

// Category classification
const CATEGORIES = {
  'Command Injection': ['exec','system','popen','subprocess','command','spawn','child_process'],
  'Code Injection': ['eval','compile','function-constructor','settimeout-string','setinterval-string'],
  'Cryptography': ['md5','sha1','crypto','hash','cipher','ssl','tls'],
  'Secrets': ['secret','key','password','token','hardcoded','api-key','credential'],
  'Deserialization': ['pickle','yaml-load','marshal','shelve','json-parse','deserializ'],
  'XSS / DOM': ['innerhtml','document.write','xss','dom','sanitiz'],
  'SQL Injection': ['sql','query','cursor','inject','sqli'],
  'Network': ['http','https','request','ftp','url','ssrf'],
  'File System': ['readfile','writefile','path','file','tempfile','directory'],
  'AI / LLM': ['openai','anthropic','llm','genai','mistral','cohere','gemini'],
};

function classifyCategory(ruleId) {
  const lower = ruleId.toLowerCase();
  for (const [cat, keywords] of Object.entries(CATEGORIES)) {
    for (const kw of keywords) {
      if (lower.includes(kw)) return cat;
    }
  }
  return 'Other';
}

function setStatus(msg, pulse) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = pulse ? 'pulse' : '';
}

async function startScan() {
  const url = document.getElementById('repoUrl').value.trim();
  if (!url) return;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.textContent = 'Scanning...';
  setStatus('Cloning repository...', true);
  document.getElementById('dashboard').style.display = 'none';

  try {
    const resp = await fetch('/api/scan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({repo_url: url}),
    });
    if (!resp.ok) { const err = await resp.json(); setStatus('Error: '+(err.detail||'Scan failed'), false); return; }
    scanData = await resp.json();
    // Enrich findings with categories
    scanData.findings.forEach(f => { f.category = classifyCategory(f.rule_id); });
    renderDashboard();
    setStatus(`Scanned ${scanData.files_scanned} files in ${scanData.duration_ms}ms`, false);
  } catch(e) { setStatus('Error: '+e.message, false); }
  finally { btn.disabled = false; btn.textContent = 'Scan'; }
}

function getFiltered() {
  if (!scanData) return [];
  return scanData.findings.filter(f => {
    if (!activeFilters.sevs.has(f.severity)) return false;
    if (activeFilters.search) {
      const s = activeFilters.search.toLowerCase();
      if (!f.rule_id.toLowerCase().includes(s) && !f.file.toLowerCase().includes(s) && !f.message.toLowerCase().includes(s) && !f.category.toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

function toggleSev(btn) {
  const sev = btn.dataset.sev;
  if (activeFilters.sevs.has(sev)) { activeFilters.sevs.delete(sev); btn.classList.remove('active'); }
  else { activeFilters.sevs.add(sev); btn.classList.add('active'); }
  applyFilters();
}

function applyFilters() {
  activeFilters.search = document.getElementById('filterSearch').value;
  renderFindings();
}

function renderDashboard() {
  document.getElementById('dashboard').style.display = 'block';
  const d = scanData;
  const total = d.findings.length;
  const errors = d.severity_counts.ERROR||0, warnings = d.severity_counts.WARNING||0, infos = d.severity_counts.INFO||0;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card" onclick="filterBySev(null)"><div class="value">${d.files_scanned}</div><div class="label">Files</div></div>
    <div class="stat-card" onclick="filterBySev(null)"><div class="value">${total}</div><div class="label">Findings</div></div>
    <div class="stat-card error" onclick="filterBySev('ERROR')"><div class="value">${errors}</div><div class="label">Errors</div></div>
    <div class="stat-card warning" onclick="filterBySev('WARNING')"><div class="value">${warnings}</div><div class="label">Warnings</div></div>
    <div class="stat-card info" onclick="filterBySev('INFO')"><div class="value">${infos}</div><div class="label">Info</div></div>
    <div class="stat-card"><div class="value">${d.duration_ms}ms</div><div class="label">Scan Time</div></div>
  `;

  Object.values(charts).forEach(c => c.destroy()); charts = {};
  const cOpts = { responsive:true, plugins:{ legend:{ labels:{ color:'#6b6b80', font:{family:'inherit',size:10} } } } };

  // Radar chart — attack surface profile
  const catCounts = {};
  d.findings.forEach(f => { const c = f.category; catCounts[c] = (catCounts[c]||0)+1; });
  const catLabels = Object.keys(catCounts).sort((a,b) => catCounts[b]-catCounts[a]);
  const catValues = catLabels.map(l => catCounts[l]);

  charts.radar = new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: catLabels,
      datasets: [{
        label: 'Findings',
        data: catValues,
        backgroundColor: 'rgba(77,122,255,0.15)',
        borderColor: '#4d7aff',
        borderWidth: 2,
        pointBackgroundColor: '#4d7aff',
        pointRadius: 3,
      }]
    },
    options: {
      ...cOpts,
      scales: {
        r: {
          angleLines: { color: '#1e1e2e' },
          grid: { color: '#1e1e2e' },
          pointLabels: { color: '#6b6b80', font: { size: 9 } },
          ticks: { display: false },
        }
      }
    }
  });

  // Severity doughnut
  charts.sev = new Chart(document.getElementById('sevChart'), {
    type: 'doughnut',
    data: { labels:['ERROR','WARNING','INFO'], datasets:[{data:[errors,warnings,infos], backgroundColor:['#ff4d6a','#ffb84d','#4dd4ff']}] },
    options: { ...cOpts, cutout:'65%', onClick: (_,els) => { if(els[0]) filterBySev(['ERROR','WARNING','INFO'][els[0].index]); } }
  });

  // Top rules
  const topRules = d.top_rules||[];
  charts.rules = new Chart(document.getElementById('rulesChart'), {
    type: 'bar',
    data: {
      labels: topRules.map(r => r.rule.split('.').pop().substring(0,25)),
      datasets: [{ label:'Hits', data:topRules.map(r=>r.count), backgroundColor:'#ff4d6a' }]
    },
    options: {
      ...cOpts, indexAxis:'y',
      scales: { x:{ticks:{color:'#6b6b80'},grid:{color:'#1e1e2e'}}, y:{ticks:{color:'#6b6b80',font:{size:9}},grid:{color:'#1e1e2e'}} },
      onClick: (_,els) => { if(els[0]) { document.getElementById('filterSearch').value = topRules[els[0].index].rule.split('.').pop(); applyFilters(); } }
    }
  });

  // Languages
  charts.lang = new Chart(document.getElementById('langChart'), {
    type: 'bar',
    data: { labels:Object.keys(d.languages), datasets:[{label:'Files',data:Object.values(d.languages),backgroundColor:'#4d7aff'}] },
    options: { ...cOpts, scales:{x:{ticks:{color:'#6b6b80'},grid:{color:'#1e1e2e'}},y:{ticks:{color:'#6b6b80'},grid:{color:'#1e1e2e'}}} }
  });

  // Tiers
  const tiers = d.tier_counts||{};
  charts.tier = new Chart(document.getElementById('tierChart'), {
    type: 'doughnut',
    data: { labels:Object.keys(tiers), datasets:[{data:Object.values(tiers),backgroundColor:['#4d7aff','#4dff88','#ffb84d','#ff4d6a']}] },
    options: { ...cOpts, cutout:'65%' }
  });

  renderFindings();
}

function filterBySev(sev) {
  if (sev === null) {
    activeFilters.sevs = new Set(['ERROR','WARNING','INFO']);
    document.querySelectorAll('.filter-btn[data-sev]').forEach(b => b.classList.add('active'));
  } else {
    activeFilters.sevs = new Set([sev]);
    document.querySelectorAll('.filter-btn[data-sev]').forEach(b => {
      b.classList.toggle('active', b.dataset.sev === sev);
    });
  }
  applyFilters();
}

let currentSort = 'file';

function setSort(mode, btn) {
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFindings();
}

const CAT_CLASSES = {
  'Command Injection':'cat-cmd', 'Code Injection':'cat-code', 'Cryptography':'cat-crypto',
  'Secrets':'cat-secrets', 'Deserialization':'cat-deser', 'XSS / DOM':'cat-xss',
  'SQL Injection':'cat-sql', 'Network':'cat-net', 'File System':'cat-file',
  'AI / LLM':'cat-ai', 'Other':'cat-other'
};

function catClass(cat) { return CAT_CLASSES[cat] || 'cat-other'; }

const SEV_ORDER = { ERROR:0, WARNING:1, INFO:2 };

function renderFindings() {
  const filtered = getFiltered();
  document.getElementById('filterCount').textContent = `${filtered.length} of ${scanData.findings.length}`;
  document.getElementById('findingsTitle').textContent = `Findings (${filtered.length})`;

  // Group findings
  const groups = {};
  let groupKey;
  if (currentSort === 'severity') groupKey = f => f.severity;
  else if (currentSort === 'category') groupKey = f => f.category;
  else groupKey = f => f.file;

  filtered.forEach(f => { const k = groupKey(f); (groups[k] = groups[k]||[]).push(f); });

  // Sort groups
  let sortedKeys;
  if (currentSort === 'severity') {
    sortedKeys = Object.keys(groups).sort((a,b) => (SEV_ORDER[a]||9) - (SEV_ORDER[b]||9));
  } else {
    sortedKeys = Object.keys(groups).sort((a,b) => groups[b].length - groups[a].length);
  }

  const tbody = document.getElementById('findingsBody');
  let html = '';

  for (const key of sortedKeys.slice(0, 80)) {
    const items = groups[key];

    // Sort findings within group by line
    items.sort((a,b) => a.line - b.line);

    // Group header
    const errCount = items.filter(f => f.severity==='ERROR').length;
    const warnCount = items.filter(f => f.severity==='WARNING').length;
    const infoCount = items.filter(f => f.severity==='INFO').length;

    let label;
    if (currentSort === 'file') {
      const parts = key.split('/');
      const name = parts.pop();
      const dir = parts.slice(-2).join('/');
      label = dir ? `<span class="file-path">${esc(dir)}/</span><span class="file-name">${esc(name)}</span>` : `<span class="file-name">${esc(name)}</span>`;
    } else if (currentSort === 'severity') {
      label = `<span class="sev sev-${key}">${key}</span>`;
    } else {
      label = `<span class="cat-pill ${catClass(key)}">${key}</span>`;
    }

    let badges = '';
    if (errCount) badges += `<span class="file-badge file-badge-error">${errCount}</span>`;
    if (warnCount) badges += `<span class="file-badge file-badge-warning">${warnCount}</span>`;
    if (infoCount) badges += `<span class="file-badge file-badge-info">${infoCount}</span>`;

    const gid = 'g-' + key.replace(/[^a-zA-Z0-9]/g, '_');
    html += `<tr class="file-group" data-gid="${gid}" onclick="toggleGroup('${gid}',this)">
      <td colspan="6"><span class="file-chevron">&#9662;</span>${label}${badges}<span style="color:var(--dim);font-size:0.65rem;margin-left:0.5rem">${items.length} finding${items.length!==1?'s':''}</span></td></tr>`;

    for (const f of items.slice(0, 100)) {
      const ruleName = f.rule_id.split('.').pop();
      html += `<tr class="finding-row sev-border-${f.severity}" data-group="${gid}" onclick="this.classList.toggle('expanded')">
        <td></td>
        <td class="line-cell">${f.line}:${f.col}</td>
        <td><span class="sev sev-${f.severity}">${f.severity}</span></td>
        <td><span class="cat-pill ${catClass(f.category)}" onclick="event.stopPropagation();document.getElementById('filterSearch').value='${f.category}';applyFilters();">${f.category}</span></td>
        <td class="rule-cell" title="${esc(f.rule_id)}">${esc(ruleName)}</td>
        <td class="msg-cell" title="${esc(f.message)}">${esc(f.message)}</td>
      </tr>`;
    }
    if (items.length > 100) {
      html += `<tr data-group="${gid}"><td colspan="6" style="color:var(--dim);text-align:center;font-size:0.65rem;padding:0.3rem">+${items.length-100} more</td></tr>`;
    }
  }
  if (sortedKeys.length > 80) {
    html += `<tr><td colspan="6" style="color:var(--dim);text-align:center;font-size:0.7rem;padding:0.5rem">+${sortedKeys.length-80} more groups</td></tr>`;
  }

  tbody.innerHTML = html;
}

function toggleGroup(gid, header) {
  header.classList.toggle('collapsed');
  document.querySelectorAll(`tr[data-group="${gid}"]`).forEach(r => {
    r.style.display = header.classList.contains('collapsed') ? 'none' : '';
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('repoUrl').addEventListener('keydown', e => { if(e.key==='Enter') startScan(); });
</script>
</body>
</html>
