  - id: community.use-click-secho
    pattern: click.echo(click.style($X, ...))
    message: "Use `click.secho($X)` instead. It combines click.echo() and click.style()."
    languages: [python]
    severity: ERROR

  - id: community.empty-aes-key
    pattern: AES.new("",...)
    message: "Potential empty AES encryption key. Using an empty key in AES encryption can result in weak encryption and may allow attackers to easily decrypt sensitive data. Ensure that a strong, non-empty key is "
    languages: [python]
    severity: WARNING

  - id: community.insecure-cipher-mode-ecb
    pattern: cryptography.hazmat.primitives.ciphers.modes.ECB($IV)
    message: "ECB (Electronic Code Book) is the simplest mode of operation for block ciphers.  Each block of data is encrypted in the same way.  This means identical plaintext blocks will always result in identical"
    languages: [python]
    severity: WARNING

  - id: community.require-encryption
    pattern: distributed.security.Security(..., require_encryption=$VAL, ...)
    message: "Initializing a security context for Dask (`distributed`) without \"require_encryption\" keyword argument may silently fail to provide security."
    languages: [python]
    severity: WARNING

  - id: community.use-json-response
    pattern: $Y = json.dumps(...)
...
django.http.HttpResponse($Y, ...)
    message: "Use JsonResponse instead"
    languages: [python]
    severity: ERROR

  - id: community.use-onetoonefield
    pattern: $F = django.db.models.ForeignKey(..., unique=True, ...)
    message: "Use 'django.db.models.OneToOneField' instead of 'ForeignKey' with unique=True. 'OneToOneField' is used to create one-to-one relationships."
    languages: [python]
    severity: WARNING

  - id: community.django-compat-2_0-signals-weak
    pattern: django.dispatch.signals.Signal.disconnect(..., weak=$X, ...)
    message: "The weak argument to django.dispatch.signals.Signal.disconnect() is removed in Django 2.0."
    languages: [python]
    severity: WARNING

  - id: community.django-compat-2_0-check-aggregate-support
    pattern: django.db.backends.base.BaseDatabaseOperations.check_aggregate_support(...)
    message: "django.db.backends.base.BaseDatabaseOperations.check_aggregate_support() is removed in Django 2.0."
    languages: [python]
    severity: WARNING

  - id: community.django-compat-2_0-assignment-tag
    pattern: assignment_tag(...)
    message: "The assignment_tag helper is removed in Django 2.0."
    languages: [python]
    severity: WARNING

  - id: community.django-compat-2_0-assert-redirects-helper
    pattern: assertRedirects(..., host=$Y, ...)
    message: "The host argument to assertRedirects is removed in Django 2.0."
    languages: [python]
    severity: WARNING

  - id: community.nontext-field-must-set-null-true
    pattern: $F = $X(..., blank=True, ...)
    message: "null=True should be set if blank=True is set on non-text fields."
    languages: [python]
    severity: ERROR

  - id: community.use-decimalfield-for-money
    pattern: $F = django.db.models.FloatField(...)
    message: "Found a FloatField used for variable $F. Use DecimalField for currency fields to avoid float-rounding errors."
    languages: [python]
    severity: ERROR

  - id: community.avoid-mark-safe
    pattern: django.utils.safestring.mark_safe(...)
    message: "'mark_safe()' is used to mark a string as \"safe\" for HTML output. This disables escaping and could therefore subject the content to XSS attacks. Use 'django.utils.html.format_html()' to build HTML for"
    languages: [python]
    severity: WARNING

  - id: community.django-secure-set-cookie
    pattern: response.set_cookie(...)
    message: "Django cookies should be handled securely by setting secure=True, httponly=True, and samesite='Lax' in response.set_cookie(...). If your situation calls for different settings, explicitly disable the "
    languages: [python]
    severity: WARNING

  - id: community.formathtml-fstring-parameter-1
    pattern: format_html(<... f"..." ...>, ...)
    message: "Passing a formatted string as first parameter to `format_html` disables the proper encoding of variables. Any HTML in the first parameter is not encoded. Using a formatted string as first parameter ob"
    languages: [python]
    severity: WARNING

  - id: community.formathtml-fstring-parameter-2
    pattern: format_html("..." % ..., ...)
    message: "Passing a formatted string as first parameter to `format_html` disables the proper encoding of variables. Any HTML in the first parameter is not encoded. Using a formatted string as first parameter ob"
    languages: [python]
    severity: WARNING

  - id: community.formathtml-fstring-parameter-3
    pattern: format_html("...".format(...), ...)
    message: "Passing a formatted string as first parameter to `format_html` disables the proper encoding of variables. Any HTML in the first parameter is not encoded. Using a formatted string as first parameter ob"
    languages: [python]
    severity: WARNING

  - id: community.html-safe
    pattern: django.utils.html.html_safe(...)
    message: "`html_safe()` add the `__html__` magic method to the provided class. The `__html__` method indicates to the Django template engine that the value is 'safe' for rendering. This means that normal HTML e"
    languages: [python]
    severity: WARNING

  - id: community.globals-as-template-context-1
    pattern: django.shortcuts.render(..., globals(...), ...)
    message: "Using 'globals()' as a context to 'render(...)' is extremely dangerous. This exposes Python functions to the template that were not meant to be exposed. An attacker could use these functions to execut"
    languages: [python]
    severity: ERROR

  - id: community.globals-as-template-context-2
    pattern: django.template.Template.render(..., globals(...), ...)
    message: "Using 'globals()' as a context to 'render(...)' is extremely dangerous. This exposes Python functions to the template that were not meant to be exposed. An attacker could use these functions to execut"
    languages: [python]
    severity: ERROR

  - id: community.hashids-with-django-secret-1
    pattern: hashids.Hashids(..., salt=django.conf.settings.SECRET_KEY, ...)
    message: "The Django secret key is used as salt in HashIDs. The HashID mechanism is not secure. By observing sufficient HashIDs, the salt used to construct them can be recovered. This means the Django secret ke"
    languages: [python]
    severity: ERROR

  - id: community.hashids-with-django-secret-2
    pattern: hashids.Hashids(django.conf.settings.SECRET_KEY, ...)
    message: "The Django secret key is used as salt in HashIDs. The HashID mechanism is not secure. By observing sufficient HashIDs, the salt used to construct them can be recovered. This means the Django secret ke"
    languages: [python]
    severity: ERROR

