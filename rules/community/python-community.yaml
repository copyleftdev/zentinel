  - id: community.formatted-string-bashoperator-1
    pattern: airflow.operators.bash_operator.BashOperator(..., bash_command="..." + $CONCAT, ...)
    message: "Found a formatted string in BashOperator: $CMD. This could be vulnerable to injection. Be extra sure your variables are not controllable by external sources."
    languages: [python]
    severity: ERROR

  - id: community.formatted-string-bashoperator-2
    pattern: airflow.operators.bash_operator.BashOperator(..., bash_command="...".format(...), ...)
