rules:
  - id: community.cohere-hardcoded-api-key-python-1
    pattern: cohere.Client(api_key="$KEY", ...)
    message: "Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead."
    languages: [python]
    severity: ERROR

  - id: community.cohere-hardcoded-api-key-python-2
    pattern: cohere.ClientV2(api_key="$KEY", ...)
    message: "Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead."
    languages: [python]
    severity: ERROR

  - id: community.gemini-missing-system-instruction-python
    pattern: genai.GenerativeModel(...)
    message: "Gemini GenerativeModel created without 'system_instruction' parameter. A system instruction helps establish behavioral guidelines and safety boundaries for the model. See https://ai.google.dev/gemini-"
    languages: [python]
    severity: WARNING

  - id: community.llm-api-key-in-source-python
    pattern: $VAR = "$KEY"
    message: "AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead."
    languages: [python]
    severity: ERROR

  - id: community.mistral-hardcoded-api-key-python-1
    pattern: Mistral(api_key="$KEY", ...)
    message: "Mistral API key is hardcoded in source code. Use environment variables or a secrets manager instead."
    languages: [python]
    severity: ERROR

  - id: community.mistral-hardcoded-api-key-python-2
    pattern: MistralClient(api_key="$KEY", ...)
