$OTHER, $ERR = fmt.$P(..., $T, ...)
...
template.URL($OTHER, ...)
    message: "Found a formatted template string passed to 'template.URL()'. 'template.URL()' does not escape contents, and this could result in XSS (cross-site scripting) and therefore confidential data being stole"
    languages: [go]
