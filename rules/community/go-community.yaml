rules:
  - id: community.anthropic-hardcoded-api-key-go
    pattern: option.WithAPIKey("$KEY")
    message: "Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead."
    languages: [go]
    severity: ERROR

  - id: community.openai-hardcoded-api-key-go
    pattern: openai.NewClient("$KEY")
    message: "OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead."
    languages: [go]
    severity: ERROR

  - id: community.detect-gemini
    pattern: genai.NewClient(...)
    message: "Possibly found usage of AI: Gemini"
    languages: [go]
    severity: INFO

  - id: community.detect-openai
    pattern: gogpt.NewClient(...)
    message: "Possibly found usage of AI: OpenAI"
    languages: [go]
    severity: INFO

  - id: community.hardcoded-eq-true-or-false-1
    pattern: if (true) { ... }
    message: "Detected useless if statement. 'if (True)' and 'if (False)' always result in the same behavior, and therefore is not necessary in the code. Remove the 'if (False)' expression completely or just the 'i"
    languages: [go]
    severity: INFO

  - id: community.hardcoded-eq-true-or-false-2
    pattern: if (false) { ... }
    message: "Detected useless if statement. 'if (True)' and 'if (False)' always result in the same behavior, and therefore is not necessary in the code. Remove the 'if (False)' expression completely or just the 'i"
    languages: [go]
    severity: INFO

  - id: community.useless-if-conditional
    pattern: if ($X) {
    ...
} else if ($X) {
    ...
}
    message: "Detected an if block that checks for the same condition on both branches (`$X`). The second condition check is useless as it is the same as the first, and therefore can be removed from the code,"
    languages: [go]
    severity: WARNING

  - id: community.useless-if-body
    pattern: if ($X) {
    $S
} else {
    $S
}
    message: "Detected identical statements in the if body and the else body of an if-statement. This will lead to the same code being executed no matter what the if-expression evaluates to. Instead, remove the if "
    languages: [go]
    severity: WARNING

  - id: community.avoid-ssh-insecure-ignore-host-key
    pattern: ssh.InsecureIgnoreHostKey()
    message: "Disabled host key verification detected. This allows man-in-the-middle attacks. Use the 'golang.org/x/crypto/ssh/knownhosts' package to do host key verification. See https://skarlso.github.io/2019/02/"
    languages: [go]
    severity: WARNING

  - id: community.use-of-rc4
    pattern: rc4.NewCipher(...)
    message: "Detected RC4 cipher algorithm which is insecure. The algorithm has many known vulnerabilities. Use AES instead."
    languages: [go]
    severity: WARNING

  - id: community.avoid-bind-to-all-interfaces-1
    pattern: tls.Listen($NETWORK, "=~/^0.0.0.0:.*$/", ...)
    message: "Detected a network listener listening on 0.0.0.0 or an empty string. This could unexpectedly expose the server publicly as it binds to all available interfaces. Instead, specify another IP address tha"
    languages: [go]
    severity: WARNING

  - id: community.avoid-bind-to-all-interfaces-2
    pattern: net.Listen($NETWORK, "=~/^0.0.0.0:.*$/", ...)
    message: "Detected a network listener listening on 0.0.0.0 or an empty string. This could unexpectedly expose the server publicly as it binds to all available interfaces. Instead, specify another IP address tha"
    languages: [go]
    severity: WARNING

  - id: community.avoid-bind-to-all-interfaces-3
    pattern: tls.Listen($NETWORK, "=~/^:.*$/", ...)
    message: "Detected a network listener listening on 0.0.0.0 or an empty string. This could unexpectedly expose the server publicly as it binds to all available interfaces. Instead, specify another IP address tha"
    languages: [go]
    severity: WARNING

  - id: community.avoid-bind-to-all-interfaces-4
    pattern: net.Listen($NETWORK, "=~/^:.*$/", ...)
    message: "Detected a network listener listening on 0.0.0.0 or an empty string. This could unexpectedly expose the server publicly as it binds to all available interfaces. Instead, specify another IP address tha"
    languages: [go]
    severity: WARNING

  - id: community.dynamic-httptrace-clienttrace
    pattern: httptrace.WithClientTrace($ANY, $TRACE)
    message: "Detected a potentially dynamic ClientTrace. This occurred because semgrep could not find a static definition for '$TRACE'. Dynamic ClientTraces are dangerous because they deserialize function code to "
    languages: [go]
    severity: WARNING

  - id: community.pprof-debug-exposure
    pattern: http.ListenAndServe(...)
    message: "The profiling 'pprof' endpoint is automatically exposed on /debug/pprof. This could leak information about the server. Instead, use `import \"net/http/pprof\"`. See https://www.farsightsecurity.com/blog"
    languages: [go]
    severity: WARNING

  - id: community.unescaped-data-in-htmlattr-1
    pattern: template.HTMLAttr($T + $X, ...)
    message: "Found a formatted template string passed to 'template. HTMLAttr()'. 'template.HTMLAttr()' does not escape contents. Be absolutely sure there is no user-controlled data in this template or validate and"
    languages: [go]
    severity: WARNING

  - id: community.unescaped-data-in-htmlattr-2
    pattern: template.HTMLAttr(fmt.$P("...", ...), ...)
    message: "Found a formatted template string passed to 'template. HTMLAttr()'. 'template.HTMLAttr()' does not escape contents. Be absolutely sure there is no user-controlled data in this template or validate and"
    languages: [go]
    severity: WARNING

  - id: community.unescaped-data-in-htmlattr-3
    pattern: $T = "..."
...
$T = $FXN(..., $T, ...)
...
template.HTMLAttr($T, ...)
    message: "Found a formatted template string passed to 'template. HTMLAttr()'. 'template.HTMLAttr()' does not escape contents. Be absolutely sure there is no user-controlled data in this template or validate and"
    languages: [go]
    severity: WARNING

  - id: community.unescaped-data-in-htmlattr-4
    pattern: $T = fmt.$P("...", ...)
...
template.HTMLAttr($T, ...)
    message: "Found a formatted template string passed to 'template. HTMLAttr()'. 'template.HTMLAttr()' does not escape contents. Be absolutely sure there is no user-controlled data in this template or validate and"
    languages: [go]
    severity: WARNING

  - id: community.unescaped-data-in-htmlattr-5
    pattern: $T = $X + $Y
...
template.HTMLAttr($T, ...)
    message: "Found a formatted template string passed to 'template. HTMLAttr()'. 'template.HTMLAttr()' does not escape contents. Be absolutely sure there is no user-controlled data in this template or validate and"
    languages: [go]
    severity: WARNING

  - id: community.unescaped-data-in-htmlattr-6
    pattern: $T = "..."
...
$OTHER, $ERR = fmt.$P(..., $T, ...)
...
template.HTMLAttr($OTHER, ...)
    message: "Found a formatted template string passed to 'template. HTMLAttr()'. 'template.HTMLAttr()' does not escape contents. Be absolutely sure there is no user-controlled data in this template or validate and"
    languages: [go]
    severity: WARNING

