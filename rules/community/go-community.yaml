  - id: community.use-tls
    pattern: http.ListenAndServe($ADDR, $HANDLER)
    message: "Found an HTTP server without TLS. Use 'http.ListenAndServeTLS' instead. See https://golang.org/pkg/net/http/#ListenAndServeTLS for more information."
    languages: [go]
    severity: WARNING

  - id: community.reflect-makefunc
    pattern: reflect.MakeFunc(...)
    message: "'reflect.MakeFunc' detected. This will sidestep protections that are normally afforded by Go's type system. Audit this call and be sure that user input cannot be used to affect the code generated by M"
    languages: [go]
    severity: ERROR

  - id: community.no-io-writestring-to-responsewriter
    pattern: io.WriteString($WRITER, $STRING)
    message: "Detected 'io.WriteString()' writing directly to 'http.ResponseWriter'. This bypasses HTML escaping that prevents cross-site scripting vulnerabilities. Instead, use the 'html/template' package to rende"
    languages: [go]
    severity: WARNING

  - id: community.bad-tmp-file-creation-1
    pattern: ioutil.WriteFile("=~//tmp/.*$/", ...)
    message: "File creation in shared tmp directory without using `io.CreateTemp`."
    languages: [go]
    severity: WARNING

  - id: community.bad-tmp-file-creation-2
    pattern: os.Create("=~//tmp/.*$/", ...)
    message: "File creation in shared tmp directory without using `io.CreateTemp`."
    languages: [go]
    severity: WARNING

  - id: community.bad-tmp-file-creation-3
    pattern: os.WriteFile("=~//tmp/.*$/", ...)
    message: "File creation in shared tmp directory without using `io.CreateTemp`."
    languages: [go]
    severity: WARNING

  - id: community.go-ssti
    pattern: $TEMPLATE = fmt.Sprintf("...", $ARG, ...)
    message: "A server-side template injection occurs when an attacker is able to use native template syntax to inject a malicious payload into a template, which is then executed server-side. When using \"html/templ"
    languages: [go]
    severity: ERROR

  - id: community.bypass-tls-verification
    pattern: $CONFIG = &tls.Config{...}
...
$CONFIG.InsecureSkipVerify = true
    message: "Checks for disabling of TLS/SSL certificate verification. This should only be used for debugging purposes because it leads to vulnerability to MTM attacks."
    languages: [go]
    severity: WARNING

  - id: community.ftp-request-1
    pattern: ftp.Dial("=~/^[fF][tT][pP]://.*/", ...)
    message: "Checks for outgoing connections to ftp servers with the ftp package. FTP does not encrypt traffic, possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol"
    languages: [go]
    severity: WARNING

  - id: community.ftp-request-2
    pattern: ftp.DialTimeout("=~/^[fF][tT][pP]://.*/", ...)
    message: "Checks for outgoing connections to ftp servers with the ftp package. FTP does not encrypt traffic, possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol"
    languages: [go]
    severity: WARNING

  - id: community.ftp-request-3
    pattern: ftp.Connect("=~/^[fF][tT][pP]://.*/")
    message: "Checks for outgoing connections to ftp servers with the ftp package. FTP does not encrypt traffic, possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol"
    languages: [go]
    severity: WARNING

  - id: community.ftp-request-4
    pattern: $URL = "=~/^[fF][tT][pP]://.*/"
...
ftp.Dial($URL, ...)
    message: "Checks for outgoing connections to ftp servers with the ftp package. FTP does not encrypt traffic, possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol"
    languages: [go]
    severity: WARNING

  - id: community.ftp-request-5
    pattern: $URL = "=~/^[fF][tT][pP]://.*/"
...
ftp.DialTimeout($URL, ...)
    message: "Checks for outgoing connections to ftp servers with the ftp package. FTP does not encrypt traffic, possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol"
    languages: [go]
    severity: WARNING

  - id: community.ftp-request-6
    pattern: $URL = "=~/^[fF][tT][pP]://.*/"
...
ftp.Connect($URL)
    message: "Checks for outgoing connections to ftp servers with the ftp package. FTP does not encrypt traffic, possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol"
    languages: [go]
    severity: WARNING

  - id: community.http-customized-request
    pattern: http.NewRequest(..., "=~/[hH][tT][tT][pP]://.*/", ...)
    message: "Checks for requests sent via http.NewRequest to http:// URLS. This is dangerous because the server is attempting to connect to a website that does not encrypt traffic with TLS. Instead, send requests "
    languages: [go]
    severity: WARNING

  - id: community.telnet-request
    pattern: telnet.DialToAndCall(...)
    message: "Checks for attempts to connect to an insecure telnet server using the package telnet. This is bad because it can lead to man in the middle attacks."
    languages: [go]
    severity: WARNING

