name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: zent-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: zent-linux-aarch64
          - os: macos-latest
            target: x86_64-macos
            artifact: zent-macos-x86_64
          - os: macos-latest
            target: aarch64-macos
            artifact: zent-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install tree-sitter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libtree-sitter-dev

      - name: Install tree-sitter (macOS)
        if: runner.os == 'macOS'
        run: brew install tree-sitter

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Run hypothesis tests
        run: |
          # Run each hypothesis individually, skip H7 (requires semgrep)
          for h in h1_treesitter_ffi h2_zir_normalization h3_error_tolerance h4_pattern_matching h5_prefilter h6_arena_benchmark h8_rule_system h9_ground_truth h10_indexed_matcher; do
            echo "── $h ──"
            zig build run-$h
          done

      - name: Package binary
        run: |
          cp zig-out/bin/zent ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
