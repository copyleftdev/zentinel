name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that Zentinel doesn't support yet?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Example commands, rule syntax, output format, etc.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New language support
        - New rule / detection pattern
        - CLI / output
        - Performance
        - Documentation
        - Other
